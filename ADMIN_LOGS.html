<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>활동 모니터링 - 2026 Management Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="theme_manager.js?v=20260318-08"></script>
    <style>
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--surface-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .stat-card h3 { font-size: 13px; color: var(--text-muted); margin: 0 0 10px 0; }
        .stat-card p { font-size: 28px; font-weight: 800; margin: 0; color: var(--primary); }

        .log-table-container {
            background: var(--surface-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: var(--nav-bg);
            padding: 15px 20px;
            text-align: left;
            font-weight: 700;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }
        tr:last-child td { border-bottom: none; }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-view { background: #e0f2fe; color: #0369a1; }
        .badge-login { background: #dcfce7; color: #166534; }
        .badge-logout { background: #fee2e2; color: #991b1b; }
        .badge-map { background: #fef9c3; color: #854d0e; }
        .badge-reg { background: #ede9fe; color: #5b21b6; }

        .details-box {
            font-size: 11px;
            font-family: monospace;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h1><i class="fas fa-history" style="color:var(--primary);"></i> 시스템 활동 로그</h1>
            <div style="display:flex; gap:10px;">
                <button class="premium-nav-btn logout" onclick="clearLogs()" style="background:#fff1f2; color:#be123c; border:1px solid #fecdd3;">
                    <i class="fas fa-trash-alt"></i> 로그 초기화
                </button>
            </div>
        </div>

        <div class="stats-row" id="stats-row">
            <!-- Stats injected here -->
        </div>

        <div class="log-table-container">
            <table>
                <thead>
                    <tr>
                        <th>시간</th>
                        <th>사용자</th>
                        <th>이벤트</th>
                        <th>상세내용</th>
                        <th>페이지</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function getBadgeClass(event) {
            switch(event) {
                case 'PAGE_VIEW': return 'badge-view';
                case 'LOGIN': return 'badge-login';
                case 'LOGOUT': return 'badge-logout';
                case 'MAP_SELECT': return 'badge-map';
                case 'VISIT_REG': return 'badge-reg';
                default: return '';
            }
        }

        function formatDetails(details) {
            if (!details || Object.keys(details).length === 0) return '-';
            return `<div class="details-box">${JSON.stringify(details)}</div>`;
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('admin_activity_logs_2026') || '[]');
            const tbody = document.getElementById('log-body');
            tbody.innerHTML = '';

            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:60px; color:var(--text-muted);">표시할 활동 내역이 없습니다.</td></tr>';
                return;
            }

            logs.forEach(log => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="white-space:nowrap;">${log.timestamp}</td>
                    <td><b>${log.user}</b> <span style="font-size:10px; opacity:0.6;">(${log.role})</span></td>
                    <td><span class="badge ${getBadgeClass(log.event)}">${log.event}</span></td>
                    <td>${formatDetails(log.details)}</td>
                    <td style="color:var(--text-muted); font-size:12px;">${log.page}</td>
                `;
                tbody.appendChild(tr);
            });

            // Update Stats
            const stats = {
                total: logs.length,
                login: logs.filter(l => l.event === 'LOGIN').length,
                map: logs.filter(l => l.event === 'MAP_SELECT').length,
                reg: logs.filter(l => l.event === 'VISIT_REG').length
            };

            const statsRow = document.getElementById('stats-row');
            statsRow.innerHTML = `
                <div class="stat-card"><h3>총 활동</h3><p>${stats.total}</p></div>
                <div class="stat-card"><h3>접속 횟수</h3><p>${stats.login}</p></div>
                <div class="stat-card"><h3>지도 탐색</h3><p>${stats.map}</p></div>
                <div class="stat-card"><h3>이력 등록</h3><p>${stats.reg}</p></div>
            `;
        }

        function clearLogs() {
            if (confirm('모든 로그를 삭제하시겠습니까? 데이터는 복구할 수 없습니다.')) {
                localStorage.removeItem('admin_activity_logs_2026');
                renderLogs();
            }
        }

        window.onload = () => {
             // Auth check
            const session = JSON.parse(localStorage.getItem('sales_dashboard_session') || '{}');
            if (session.role !== 'admin') {
                alert('관리자 전용 페이지입니다.');
                location.href = 'index.html';
                return;
            }
            renderLogs();
        };
    </script>
</body>
</html>
