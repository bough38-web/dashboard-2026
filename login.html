<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시스템 로그인 - 강북/강원 관리 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme_manager.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.08); /* Glassmorphism base */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Subtle background animation */
        body::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            background: var(--primary);
            filter: blur(150px);
            top: 10%; right: 10%;
            opacity: 0.2;
            z-index: -1;
        }

        .login-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
        .header-section p { font-size: 14px; color: var(--text-muted); margin: 8px 0 0 0; }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 32px;
            border: 1px solid var(--border-glass);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            color: var(--text-muted);
            transition: var(--transition-smooth);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 13px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; padding-left: 4px; }

        .input-wrapper { position: relative; }
        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            background: var(--input-bg);
            color: white;
            font-size: 15px;
            outline: none;
            transition: var(--transition-smooth);
            appearance: none;
        }

        /* Style for select dropdown options */
        select option { background: #1e293b; color: white; }

        select:focus, input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .pw-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
        }

        .error-msg {
            color: #fb7185;
            font-size: 13px;
            margin-top: 16px;
            text-align: center;
            display: none;
            font-weight: 600;
            padding: 10px;
            background: rgba(251, 113, 133, 0.1);
            border-radius: 8px;
        }

        .footer-credit {
            position: absolute;
            bottom: 24px;
            right: 24px;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; border-radius: 0; border: none; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        }
    </style>
</head>
<body>

<body>

<div class="login-container">
    <div class="header-section">
        <h1>2026 Management Hub</h1>
        <p>강북강원본부 지표 관리 시스템</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-role="manager"><i data-lucide="user"></i> 영업구역</div>
        <div class="tab" data-role="branch"><i data-lucide="building-2"></i> 지사</div>
        <div class="tab" data-role="admin"><i data-lucide="shield-check"></i> 관리자</div>
    </div>

    <!-- Manager Form -->
    <div id="manager-form" class="role-form">
        <div class="form-group">
            <label class="form-label">소속 지사</label>
            <select id="branch-select">
                <option value="">지사를 선택하세요</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">영업구역번호</label>
            <select id="manager-select" disabled>
                <option value="">지사를 먼저 선택하세요</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">비밀번호(영문 소문자)</label>
            <div class="input-wrapper">
                <input type="password" id="manager-pw" placeholder="영업구역번호 입력">
                <i data-lucide="eye" class="pw-toggle" onclick="togglePassword('manager-pw')"></i>
            </div>
        </div>
        <button class="login-btn" onclick="handleLogin('manager')">시스템 접속</button>
    </div>

    <!-- Branch Form -->
    <div id="branch-form" class="role-form" style="display:none;">
        <div class="form-group">
            <label class="form-label">소속 지사</label>
            <select id="branch-only-select">
                <option value="">지사를 선택하세요</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">지사 보안 암호</label>
            <div class="input-wrapper">
                <input type="password" id="branch-pw" placeholder="••••••••">
                <i data-lucide="eye" class="pw-toggle" onclick="togglePassword('branch-pw')"></i>
            </div>
        </div>
        <button class="login-btn" onclick="handleLogin('branch')">지사 대시보드 접속</button>
    </div>

    <!-- Admin Form -->
    <div id="admin-form" class="role-form" style="display:none;">
        <div class="form-group">
            <label class="form-label">관리자 아이디</label>
            <input type="text" id="admin-id" value="admin" readonly>
        </div>
        <div class="form-group">
            <label class="form-label">마스터 암호</label>
            <div class="input-wrapper">
                <input type="password" id="admin-pw" placeholder="••••••••">
                <i data-lucide="eye" class="pw-toggle" onclick="togglePassword('admin-pw')"></i>
            </div>
        </div>
        <button class="login-btn" onclick="handleLogin('admin')">관리자 모드 접속</button>
    </div>

    <p id="error-display" class="error-msg">인증 정보가 올바르지 않습니다.</p>
</div>

<div class="footer-credit">Developed by SE-EUN Daddy</div>

<script src="data/auth_config.js"></script>
<script>
    lucide.createIcons();

    let currentRole = 'manager';

    // Tabs logic
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            currentRole = tab.dataset.role;
            document.querySelectorAll('.role-form').forEach(f => f.style.display = 'none');
            document.getElementById(`${currentRole}-form`).style.display = 'block';
            document.getElementById('error-display').style.display = 'none';
        };
    });

    // Populate branch select
    const branchSelects = [document.getElementById('branch-select'), document.getElementById('branch-only-select')];
    AUTH_CONFIG.branches.forEach(br => {
        branchSelects.forEach(s => {
            const opt = document.createElement('option');
            opt.value = br;
            opt.textContent = br;
            s.appendChild(opt);
        });
    });

    function maskName(name) {
        if (!name) return "";
        if (name.length <= 1) return name;
        if (name.length === 2) return name[0] + "*";
        return name[0] + "*" + name.slice(2); 
    }

    // Populate manager select based on branch
    document.getElementById('branch-select').onchange = (e) => {
        const branch = e.target.value;
        const managerSelect = document.getElementById('manager-select');
        managerSelect.innerHTML = '<option value="">영업구역번호를 선택하세요</option>';
        
        if (!branch) {
            managerSelect.disabled = true;
            return;
        }

        // Unique area numbers (already unique in auth_config.js)
        const filtered = AUTH_CONFIG.managers.filter(m => m.branch === branch);

        filtered.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name; // Area Number
            managerSelect.appendChild(opt);
        });
        managerSelect.disabled = false;
    };

    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    function handleLogin(role) {
        const errorDisplay = document.getElementById('error-display');
        errorDisplay.style.display = 'none';

        if (role === 'manager') {
            const id = document.getElementById('manager-select').value;
            const pw = document.getElementById('manager-pw').value;
            const manager = AUTH_CONFIG.managers.find(m => m.id === id);
            
            if (manager && manager.pw === pw) {
                saveSession(role, manager);
            } else {
                showError('비밀번호가 틀렸거나 영업구역번호를 선택하지 않았습니다.');
            }
        } else if (role === 'branch') {
            const branch = document.getElementById('branch-only-select').value;
            const pw = document.getElementById('branch-pw').value;
            const correctPw = AUTH_CONFIG.branch_passwords[branch];
            
            if (branch && correctPw === pw) {
                saveSession(role, { branch });
            } else {
                showError('지사 비밀번호가 일치하지 않습니다.');
            }
        } else if (role === 'admin') {
            const pw = document.getElementById('admin-pw').value;
            if (pw === AUTH_CONFIG.admin_pw) {
                saveSession(role, { name: 'Admin' });
            } else {
                showError('관리자 비밀번호가 일치하지 않습니다.');
            }
        }
    }

    function saveSession(role, data) {
        const session = {
            role,
            data,
            timestamp: new Date().getTime()
        };
        localStorage.setItem('sales_dashboard_session', JSON.stringify(session));
        
        // Log Login
        if (typeof TrackingManager !== 'undefined') {
            TrackingManager.log('LOGIN', { role });
        }
        
        // Redirect to main index
        location.href = 'index.html';
    }

    function showError(msg) {
        const errorDisplay = document.getElementById('error-display');
        errorDisplay.textContent = msg;
        errorDisplay.style.display = 'block';
    }
</script>

</body>
</html>
